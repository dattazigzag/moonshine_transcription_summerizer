services:
  meeting-transcript-summarizer:
    build: .
    container_name: meeting-transcript-summarizer
    restart: unless-stopped
    ports:
      - "2070:2070"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - PYTHONUNBUFFERED=1
    volumes:
      - /data/services/meeting-summarizer/outputs:/app/output
    networks:
      - ziggie-net
networks:
  ziggie-net:
    external: true
